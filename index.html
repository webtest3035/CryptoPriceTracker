<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Crypto Price Tracker</title>
</head>

<body>

    <main>

        <div class="inputs">
            <h1>Crypto Price Tracker</h1>

            <input list="list" type="text" id="cryptoInput" placeholder="Enter Crypto Currency">

            <datalist id="list">
                <option value="Bitcoin"></option>
                <option value="Ethereum"></option>
                <option value="Tether"></option>
                <option value="Solana"></option>
                <option value="TRON"></option>
                <option value="Dogecoin"></option>
                <option value="Hyperliquid"></option>
            </datalist>

            <button id="cryptoInputSubmit">Submit</button>

            <p id="cryptoResult"></p>

            <div id="loading">
                <h3>Loading...</h3>
            </div>
        </div>
    </main>


    <script src="script.js"></script>
</body>

</html>
